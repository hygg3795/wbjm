<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>孤光文本加密器</title><style>:root{--neon-green:#00ff41;--neon-blue:#00d4ff;--danger:#ff4d4d;--dark-bg:#050505;--panel-bg:#111}body{background-color:var(--dark-bg);color:var(--neon-green);font-family:'Fira Code','Courier New',monospace;margin:0;display:flex;justify-content:center;align-items:center;min-height:100vh}.main-wrapper{width:95%;max-width:1400px;background:var(--panel-bg);border:1px solid var(--neon-green);box-shadow:0 0 30px rgba(0,255,65,.15);padding:40px;border-radius:8px}.header{text-align:center;border-bottom:2px solid var(--neon-green);margin-bottom:35px;padding-bottom:15px}.header h1{margin:0;font-size:2.2rem;letter-spacing:10px;text-shadow:0 0 15px var(--neon-green);color:var(--neon-green)}.grid-container{display:grid;grid-template-columns:1fr 340px 1fr;gap:30px}@media (max-width:1200px){.grid-container{grid-template-columns:1fr}}.area{display:flex;flex-direction:column}.panel-label{font-size:.8rem;color:#888;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}textarea{width:100%;height:500px;background:#000;border:1px solid #222;color:var(--neon-green);padding:15px;box-sizing:border-box;resize:none;outline:0;font-size:14px;line-height:1.5;transition:.3s}textarea:focus{border-color:var(--neon-blue)}.controls{display:flex;flex-direction:column;justify-content:center;gap:20px;background:#0a0a0a;padding:25px;border:1px solid #222;border-radius:5px}.pwd-section{margin-bottom:10px}input[type="password"]{width:100%;background:#000;border:1px solid #333;color:var(--neon-blue);padding:12px;box-sizing:border-box;outline:0;text-align:center;font-size:1.1rem}.strength-container{margin-top:8px;background:#222;height:4px;width:100%;border-radius:2px;overflow:hidden}.strength-bar{height:100%;width:0%;transition:all .5s ease}.strength-text{font-size:10px;margin-top:5px;text-align:right;text-transform:uppercase}.btn-group{display:flex;flex-direction:column;gap:15px}.btn-action{padding:18px;cursor:pointer;border:1px solid var(--neon-green);font-weight:bold;text-transform:uppercase;letter-spacing:2px;transition:.3s}.btn-enc{background:var(--neon-green);color:#000}.btn-dec{background:0 0;color:var(--neon-green)}.btn-action:hover{box-shadow:0 0 20px var(--neon-green);transform:translateY(-2px)}.btn-copy{background:#222;color:#aaa;border:0;padding:4px 10px;cursor:pointer;font-size:10px;border-radius:3px}.btn-copy:hover{background:#333;color:var(--neon-blue)}.status-msg{font-size:11px;text-align:center;color:#555;margin-top:15px}</style></head><body><div class="main-wrapper"><div class="header"><h1>孤光语言加密器</h1></div><div class="grid-container"><div class="area"><div class="panel-label"><span>[INPUT] 原始载荷 / 密文</span><button class="btn-copy" onclick="copyValue('inputData')">COPY</button></div><textarea id="inputData" placeholder="在此输入需要处理的信息..."></textarea></div><div class="controls"><div class="pwd-section"><div class="panel-label">ACCESS KEY / 访问密码</div><input type="password" id="password" placeholder="******" oninput="checkStrength(this.value)"><div class="strength-container"><div id="strengthBar" class="strength-bar"></div></div><div id="strengthLabel" class="strength-text" style="color:#444">强度: 待输入</div></div><div class="btn-group"><button class="btn-action btn-enc" onclick="runEncrypt()">执行孤光加密</button><button class="btn-action btn-dec" onclick="runDecrypt()">执行孤光解密</button></div><div class="status-msg">PROTOCOL: AES-256-CBC<br>SECURITY: PBKDF2 HARDENED</div></div><div class="area"><div class="panel-label"><span>[OUTPUT] 处理结果</span><button class="btn-copy" onclick="copyValue('outputData')">COPY</button></div><textarea id="outputData" readonly placeholder="等待指令执行..."></textarea></div></div></div><script>function copyValue(id){const el=document.getElementById(id);if(!el.value)return;el.select();document.execCommand('copy');const btn=event.target;const originalText=btn.innerText;btn.innerText="SUCCESS";btn.style.color="var(--neon-green)";setTimeout(()=>{btn.innerText=originalText;btn.style.color="#aaa"},1500)}function checkStrength(p){let score=0;if(p.length>0)score+=10;if(p.length>=8)score+=20;if(/[A-Z]/.test(p))score+=20;if(/[0-9]/.test(p))score+=25;if(/[^A-Za-z0-9]/.test(p))score+=25;const bar=document.getElementById('strengthBar');const label=document.getElementById('strengthLabel');bar.style.width=score+"%";if(score<30){bar.style.background='var(--danger)';label.innerText="强度: 极危";label.style.color='var(--danger)'}else if(score<60){bar.style.background='#ffeb3b';label.innerText="强度: 一般";label.style.color='#ffeb3b'}else if(score<90){bar.style.background='var(--neon-blue)';label.innerText="强度: 安全";label.style.color='var(--neon-blue)'}else{bar.style.background='var(--neon-green)';label.innerText="强度: 坚不可摧";label.style.color='var(--neon-green)'}}async function deriveKey(password,salt){const encoder=new TextEncoder();const baseKey=await crypto.subtle.importKey("raw",encoder.encode(password),"PBKDF2",false,["deriveKey"]);return crypto.subtle.deriveKey({name:"PBKDF2",salt:salt,iterations:100000,hash:"SHA-256"},baseKey,{name:"AES-CBC",length:256},false,["encrypt","decrypt"])}async function runEncrypt(){const data=document.getElementById('inputData').value;const pw=document.getElementById('password').value;if(!data||!pw)return alert("请完整输入数据和密码");const salt=crypto.getRandomValues(new Uint8Array(16));const iv=crypto.getRandomValues(new Uint8Array(16));const key=await deriveKey(pw,salt);const encrypted=await crypto.subtle.encrypt({name:"AES-CBC",iv:iv},key,new TextEncoder().encode(data));const combined=new Uint8Array(salt.length+iv.length+encrypted.byteLength);combined.set(salt);combined.set(iv,16);combined.set(new Uint8Array(encrypted),32);document.getElementById('outputData').value=btoa(String.fromCharCode(...combined))}async function runDecrypt(){const b64=document.getElementById('inputData').value;const pw=document.getElementById('password').value;if(!b64||!pw)return;try{const raw=new Uint8Array(atob(b64).split("").map(c=>c.charCodeAt(0)));const salt=raw.slice(0,16);const iv=raw.slice(16,32);const data=raw.slice(32);const key=await deriveKey(pw,salt);const decrypted=await crypto.subtle.decrypt({name:"AES-CBC",iv:iv},key,data);document.getElementById('outputData').value=new TextDecoder().decode(decrypted)}catch(e){alert("密钥错误")}}</script></body></html>
